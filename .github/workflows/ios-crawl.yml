name: iOS Crawl (Maestro)

on:
  workflow_dispatch:
    inputs:
      run_exploration:
        description: "Also run the exploratory crawl (best-effort, non-blocking)"
        type: boolean
        default: false
  push:
    branches:
      - "ios-crawl/**"

permissions:
  contents: read

concurrency:
  group: ios-crawl-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl:
    # macos-15 ships Xcode 16.3+ (Swift 6.1) which is required by the
    # transitive swift-crypto >=4.5.0 pulled in by Supabase. macos-14 only
    # has Xcode 16.2 (Swift 6.0) and fails dependency resolution.
    runs-on: macos-15
    timeout-minutes: 35
    env:
      DERIVED_DATA: ${{ github.workspace }}/build/DerivedData
      REPORTS_DIR: ${{ github.workspace }}/reports/maestro
      SCREENSHOT_DIR: ${{ github.workspace }}/.maestro/screenshots
      SIM_LOG: ${{ github.workspace }}/reports/simulator.log
      SIM_DEVICE: iPhone 15
      RUN_EXPLORATION: ${{ inputs.run_exploration && '1' || '0' }}
      # Maestro XCTest driver often times out on cold iOS Simulator boots in CI.
      MAESTRO_DRIVER_STARTUP_TIMEOUT: "180000"
      MAESTRO_SIM_STABILIZE_SECONDS: "35"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Xcode + simulator info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | head -40
          xcrun simctl list devicetypes | grep -E "iPhone 1[5-9]" || true

      - name: Install xcodegen / maestro / xcbeautify
        run: |
          brew install xcodegen xcbeautify
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Cache SPM + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            build/DerivedData
          key: ${{ runner.os }}-ios-crawl-${{ hashFiles('watchos/project.yml', 'watchos/KinetixWatch.xcodeproj/project.pbxproj', 'ios/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-ios-crawl-

      - name: Build, install, and run Maestro flows
        run: bash scripts/ios-maestro/build-and-run.sh
        env:
          SIM_DEVICE: ${{ env.SIM_DEVICE }}
          DERIVED_DATA: ${{ env.DERIVED_DATA }}
          REPORTS_DIR: ${{ env.REPORTS_DIR }}
          SCREENSHOT_DIR: ${{ env.SCREENSHOT_DIR }}
          SIM_LOG: ${{ env.SIM_LOG }}
          RUN_EXPLORATION: ${{ env.RUN_EXPLORATION }}

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-${{ github.run_id }}
          path: |
            .maestro/screenshots/**
            reports/maestro/debug/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Maestro JUnit + xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-reports-${{ github.run_id }}
          path: |
            reports/maestro/**
            reports/simulator.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-crawl-xcresults-${{ github.run_id }}
          path: |
            build/DerivedData/Logs/Test/**/*.xcresult
          if-no-files-found: warn
          retention-days: 14
