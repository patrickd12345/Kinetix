# Manual Lighthouse CI against a deployed or preview URL. Override the placeholder in lighthouserc.json.
# Usage: Actions → Lighthouse CI → Run workflow → set target_url (e.g. Vercel preview).

name: Lighthouse CI

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Full HTTPS URL to audit (e.g. https://kinetix.example.com)
        required: true
        type: string

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun --collect.url="${{ inputs.target_url }}"
