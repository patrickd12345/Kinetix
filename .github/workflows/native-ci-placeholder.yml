# Placeholder for future iOS/watchOS automation (xcodebuild UI tests, Fastlane).
# Does not build native targets; documents intent and keeps a green path for manual native audits.

name: Native CI (placeholder)

on:
  workflow_dispatch:
  push:
    paths:
      - 'ios/**'
      - 'watchos/**'
      - '.github/workflows/native-ci-placeholder.yml'

permissions:
  contents: read

jobs:
  native_placeholder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Native audit reminder
        run: |
          echo "Native code changed. Run the manual audit in docs/audit/KINETIX_NATIVE_AUDIT_RUNBOOK.md"
          echo "Future: macos-latest + xcodebuild test -scheme KinetixPhone (see runbook)."
