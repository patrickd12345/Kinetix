name: Native CI

on:
  pull_request:
    paths:
      - "ios/**"
      - "watchos/**"
      - ".github/workflows/native-ci.yml"
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "watchos/**"
      - ".github/workflows/native-ci.yml"

permissions:
  contents: read

concurrency:
  group: native-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios_watch:
    runs-on: macos-14
    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            DerivedData
          key: ${{ runner.os }}-native-${{ hashFiles('watchos/project.yml', 'ios/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-native-

      - name: XcodeGen (watchos/project.yml)
        working-directory: watchos
        run: xcodegen generate

      - name: Build for testing — KinetixPhone (iOS Simulator)
        working-directory: watchos
        run: >
          xcodebuild -project KinetixWatch.xcodeproj
          -scheme KinetixPhone
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath "${{ env.DERIVED_DATA }}"
          CODE_SIGNING_ALLOWED=NO
          build-for-testing

      - name: Run KinetixPhone unit tests
        working-directory: watchos
        run: |
          set -euo pipefail
          UDID="$(bash scripts/resolve-iphone-sim-udid.sh)"
          xcodebuild -project KinetixWatch.xcodeproj \
            -scheme KinetixPhone \
            -destination "platform=iOS Simulator,id=${UDID}" \
            -derivedDataPath "${{ env.DERIVED_DATA }}" \
            -only-testing:KinetixPhoneTests \
            test-without-building

      # Watch: target + watchsimulator is reliable in CI. The KinetixWatch *scheme* often does not
      # expose watchOS Simulator destinations (only "Any watchOS Device"), so scheme + simulator id fails.
      # Optional: KinetixHostUITests via scheme+sim — re-enable when the scheme lists a concrete Watch sim.
      - name: Compile KinetixWatch (watchsimulator, target-based)
        working-directory: watchos
        run: >
          xcodebuild -project KinetixWatch.xcodeproj
          -target KinetixWatch
          -sdk watchsimulator
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Upload xcresults on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-ci-xcresults-${{ github.run_id }}
          path: |
            DerivedData/**/*.xcresult
          if-no-files-found: warn
