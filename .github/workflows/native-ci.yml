name: Native CI

on:
  pull_request:
    paths:
      - "ios/**"
      - "watchos/**"
      - ".github/workflows/native-ci.yml"
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "watchos/**"
      - ".github/workflows/native-ci.yml"

permissions:
  contents: read

concurrency:
  group: native-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios_watch:
    runs-on: macos-14
    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      # Adjust if Xcode image drops this Watch simulator display name (see Actions log).
      WATCH_SIM: platform=watchOS Simulator,name=Apple Watch Series 10 (46mm)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            DerivedData
          key: ${{ runner.os }}-native-${{ hashFiles('watchos/project.yml', 'ios/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-native-

      - name: XcodeGen (watchos/project.yml)
        working-directory: watchos
        run: xcodegen generate

      - name: Build for testing — KinetixPhone (generic iOS)
        working-directory: watchos
        run: >
          xcodebuild -project KinetixWatch.xcodeproj
          -scheme KinetixPhone
          -destination 'generic/platform=iOS'
          -derivedDataPath "${{ env.DERIVED_DATA }}"
          CODE_SIGNING_ALLOWED=NO
          build-for-testing

      - name: Build for testing — KinetixWatch (watchOS Simulator)
        working-directory: watchos
        run: >
          xcodebuild -project KinetixWatch.xcodeproj
          -scheme KinetixWatch
          -destination "${{ env.WATCH_SIM }}"
          -derivedDataPath "${{ env.DERIVED_DATA }}"
          CODE_SIGNING_ALLOWED=NO
          build-for-testing

      - name: Run Watch UI tests (without building)
        working-directory: watchos
        run: >
          xcodebuild -project KinetixWatch.xcodeproj
          -scheme KinetixWatch
          -destination "${{ env.WATCH_SIM }}"
          -derivedDataPath "${{ env.DERIVED_DATA }}"
          test-without-building
          -only-testing KinetixHostUITests

      - name: Upload xcresults on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-ci-xcresults-${{ github.run_id }}
          path: |
            DerivedData/**/*.xcresult
          if-no-files-found: warn
