# Web CI: same install + build path as Vercel (scripts/vercel-install.sh, then type-check, lint, build).
# Kinetix is a standalone repo; @bookiji-inc/* comes from cloning Bookiji-inc (see vercel-install.sh).
# GITHUB_TOKEN is passed through for authenticated clone when the Actions policy allows access to patrickd12345/Bookiji-inc.
# If Bookiji-inc is private and the default token cannot read it, add repository secret BOOKIJI_INC_CLONE_TOKEN
# (PAT with contents:read) and add to job env: BOOKIJI_INC_CLONE_TOKEN: ${{ secrets.BOOKIJI_INC_CLONE_TOKEN }}.

name: Web CI

on:
  push:
    paths:
      - 'apps/web/**'
      - 'packages/core/**'
      - 'api/**'
      - 'scripts/**'
      - 'vercel.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'lighthouserc.json'
      - '.github/workflows/web-ci.yml'
      - '.github/workflows/lighthouse-ci.yml'
      - '.github/workflows/native-ci-placeholder.yml'
      - 'scripts/verify-vercel-parity.mjs'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/core/**'
      - 'api/**'
      - 'scripts/**'
      - 'vercel.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'lighthouserc.json'
      - '.github/workflows/web-ci.yml'
      - '.github/workflows/lighthouse-ci.yml'
      - '.github/workflows/native-ci-placeholder.yml'
      - 'scripts/verify-vercel-parity.mjs'

permissions:
  contents: read

jobs:
  vercel-parity:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      BOOKIJI_INC_CLONE_TOKEN: ${{ secrets.BOOKIJI_INC_CLONE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: "Vercel parity (same as deploy: install + type-check + lint + build)"
        run: node scripts/verify-vercel-parity.mjs

  vitest-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      BOOKIJI_INC_CLONE_TOKEN: ${{ secrets.BOOKIJI_INC_CLONE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (Vercel parity path)
        run: bash scripts/vercel-install.sh

      - name: Vitest coverage gate
        run: pnpm --filter @kinetix/web test:coverage
