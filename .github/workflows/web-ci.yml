# Web CI: build and test the Kinetix web app (apps/web) and core.
# Runs on push/PR when web app, core, or deploy config change.
# Vercel deploys from repo (see vercel.json); if deploys stopped, check Vercel dashboard and branch.

name: Web CI

on:
  push:
    paths:
      - 'apps/web/**'
      - 'packages/core/**'
      - 'vercel.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/core/**'
      - 'vercel.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/web-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: No local ai-core guard
        run: node scripts/check-no-local-ai-core.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build
