appId: com.patrickduchesneau.KinetixPhone
name: exploration/crawl
tags:
  - exploration
---
- launchApp:
    appId: com.patrickduchesneau.KinetixPhone
    clearState: true
    stopApp: true
    permissions:
      all: deny
      location: inuse
      notifications: allow
- waitForAnimationToEnd:
    timeout: 5000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: crawl-00-home

- repeat:
    times: 5
    commands:
      - tapOn:
          point: "10%,95%"
      - waitForAnimationToEnd:
          timeout: 2000
      - takeScreenshot: crawl-iter-home
      - runFlow: ../helpers/dismiss-system-alerts.yml

      - tapOn:
          point: "30%,95%"
      - waitForAnimationToEnd:
          timeout: 2000
      - scroll
      - scroll
      - takeScreenshot: crawl-iter-coach
      - runFlow: ../helpers/dismiss-system-alerts.yml

      - tapOn:
          point: "50%,95%"
      - waitForAnimationToEnd:
          timeout: 2000
      - scroll
      - takeScreenshot: crawl-iter-build
      - runFlow: ../helpers/dismiss-system-alerts.yml

      - tapOn:
          point: "70%,95%"
      - waitForAnimationToEnd:
          timeout: 2000
      - scroll
      - takeScreenshot: crawl-iter-history
      - runFlow: ../helpers/dismiss-system-alerts.yml

      - tapOn:
          point: "90%,95%"
      - waitForAnimationToEnd:
          timeout: 2000
      - scroll
      - scroll
      - scroll
      - takeScreenshot: crawl-iter-settings
      - runFlow: ../helpers/dismiss-system-alerts.yml
