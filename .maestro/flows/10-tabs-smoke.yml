appId: com.patrickduchesneau.KinetixPhone
name: 10-tabs-smoke
tags:
  - smoke
---
- launchApp:
    appId: com.patrickduchesneau.KinetixPhone
    clearState: false
    stopApp: false
    permissions:
      all: deny
      location: inuse
      notifications: allow
- runFlow: ../helpers/dismiss-system-alerts.yml

- assertVisible: "KINETIX"
- takeScreenshot: 10-tab-home

- tapOn:
    point: "30%,95%"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-coach

- tapOn:
    point: "50%,95%"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-build

- tapOn:
    point: "70%,95%"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-history

- tapOn:
    point: "90%,95%"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-settings

- tapOn:
    point: "10%,95%"
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible: "KINETIX"
- takeScreenshot: 10-tab-home-return
