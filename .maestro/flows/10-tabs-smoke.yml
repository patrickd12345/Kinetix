appId: com.patrickduchesneau.KinetixPhone
name: 10-tabs-smoke
tags:
  - smoke
---
- launchApp:
    appId: com.patrickduchesneau.KinetixPhone
    clearState: false
    stopApp: false
    permissions:
      all: deny
      location: inuse
      notifications: allow
- runFlow: ../helpers/dismiss-system-alerts.yml

- assertVisible:
    id: "KinetixTab.home"
- takeScreenshot: 10-tab-home

- tapOn:
    id: "KinetixTab.coach"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-coach

- tapOn:
    id: "KinetixTab.build"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-build

- tapOn:
    id: "KinetixTab.history"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-history

- tapOn:
    id: "KinetixTab.settings"
- waitForAnimationToEnd:
    timeout: 4000
- runFlow: ../helpers/dismiss-system-alerts.yml
- takeScreenshot: 10-tab-settings

- tapOn:
    id: "KinetixTab.home"
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible: "KINETIX"
- takeScreenshot: 10-tab-home-return
