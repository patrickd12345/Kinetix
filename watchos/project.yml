name: KinetixWatch
options:
  bundleIdPrefix: com.kinetix
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

targets:
  KinetixPhone:
    type: application
    platform: iOS
    sources:
      - path: ../ios/KinetixPhone
      - path: KinetixWatch/Models/Run.swift
      - path: KinetixWatch/Models/WorkoutConfig.swift
      - path: KinetixWatch/Models/ActivityTemplate.swift
      - path: KinetixWatch/Models/FormMonitorSample.swift
      - path: KinetixWatch/Services/BatteryManager.swift
      - path: KinetixWatch/FormMetrics.swift
      - path: KinetixWatch/AICoach.swift
      - path: KinetixWatch/VoiceCoach.swift
      - path: KinetixWatch/AdaptiveLearner.swift
      - path: KinetixWatch/CoreMLCoach.swift
      - path: KinetixWatch/FormCoach.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.patrickduchesneau.KinetixPhone
      INFOPLIST_FILE: ../ios/KinetixPhone/Info.plist
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      DEVELOPMENT_TEAM: "AWJBX83Y4X"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
      ENABLE_PREVIEWS: YES
      
  KinetixWatch:
    type: application
    platform: watchOS
    sources:
      - path: KinetixWatch
        excludes:
          - "**/*.app"
          - "**/*.ipa"
      - path: KinetixWatch/Models/ActivityTemplate.swift
      - path: KinetixWatch/Models/FormMonitorSample.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.patrickduchesneau.KinetixWatchOS
      INFOPLIST_FILE: KinetixWatch/Info.plist
      CODE_SIGN_ENTITLEMENTS: KinetixWatch/KinetixWatch.entitlements
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "4"
      WATCHOS_DEPLOYMENT_TARGET: "10.0"
      DEVELOPMENT_TEAM: "AWJBX83Y4X"
      SUPPORTED_PLATFORMS: watchos
      CODE_SIGN_CONTEXT_CLASS: XCWatchOSCodeSignContext
      SKIP_INSTALL: NO
    capabilities:
      - Background Modes
      - HealthKit

schemes:
  KinetixPhone:
    build:
      targets:
        KinetixPhone: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  KinetixWatch:
    build:
      targets:
        KinetixWatch: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
